services:
  - type: web
    name: squad4-backend
    runtime: node
    repo: https://github.com/kavyagudiwada/Personalized-learning-roadmap-in-progress-
    branch: main
    rootDir: backend
    buildCommand: pnpm install && pnpm prisma generate && pnpm prisma migrate deploy && pnpm run build
    startCommand: pnpm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: squad4-db
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: squad4-db
          property: connectionString
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: BETTER_AUTH_URL
        fromService:
          name: squad4-backend
          type: web
          property: host
      - key: FRONTEND_URL
        value: https://frontend-sigma-sooty-33.vercel.app
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX
        value: skill-gap

databases:
  - name: squad4-db
    plan: free
    databaseName: skillgap
    region: oregon
