services:
  - type: web
    name: learnflow-backend
    runtime: node
    rootDir: backend
    buildCommand: pnpm install && pnpm run prisma:generate && pnpm run build
    startCommand: pnpm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5001
      - key: DATABASE_URL
        fromDatabase:
          name: learnflow-db
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: learnflow-db
          property: connectionString
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: BETTER_AUTH_URL
        sync: false
      - key: FRONTEND_URL
        value: https://personalized-learning-roadmap-in-progress-pr-sigma.vercel.app
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: YOUTUBE_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: learnflow-db
    plan: free
    databaseName: career_intel
    user: learnflow
